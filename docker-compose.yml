version: '3.8'

services:
  # Oracle Database (optional - if you want to run Oracle in Docker)
  oracle-db:
    image: container-registry.oracle.com/database/express:21.3.0-xe
    container_name: thinkonerp-oracle
    environment:
      - ORACLE_PWD=OraclePassword123
      - ORACLE_CHARACTERSET=AL32UTF8
    ports:
      - "1521:1521"
      - "5500:5500"
    volumes:
      - oracle-data:/opt/oracle/oradata
      - ./Database/Scripts:/docker-entrypoint-initdb.d/startup
    networks:
      - thinkonerp-network
    healthcheck:
      test: ["CMD", "sqlplus", "-L", "sys/OraclePassword123@//localhost:1521/XE as sysdba", "@/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ThinkOnErp API
  thinkonerp-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: thinkonerp-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__OracleDb=Data Source=(DESCRIPTION=(ADDRESS=(PROTOCOL=TCP)(HOST=oracle-db)(PORT=1521))(CONNECT_DATA=(SERVICE_NAME=XEPDB1)));User Id=SYSTEM;Password=OraclePassword123;
      - JwtSettings__SecretKey=your-secret-key-here-must-be-at-least-32-characters-long-for-security-change-this-in-production
      - JwtSettings__Issuer=ThinkOnErpAPI
      - JwtSettings__Audience=ThinkOnErpClient
      - JwtSettings__ExpiryInMinutes=60
      - Serilog__MinimumLevel__Default=Information
    ports:
      - "5000:8080"
    depends_on:
      oracle-db:
        condition: service_healthy
    networks:
      - thinkonerp-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  # Nginx Reverse Proxy (optional)
  nginx:
    image: nginx:alpine
    container_name: thinkonerp-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - thinkonerp-api
    networks:
      - thinkonerp-network
    restart: unless-stopped

volumes:
  oracle-data:
    driver: local

networks:
  thinkonerp-network:
    driver: bridge
