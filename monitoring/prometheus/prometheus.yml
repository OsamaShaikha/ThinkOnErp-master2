# Prometheus Configuration for ThinkOnErp Full Traceability System

global:
  scrape_interval: 15s      # How frequently to scrape targets
  evaluation_interval: 15s  # How frequently to evaluate rules
  external_labels:
    cluster: 'thinkonerp'
    environment: 'production'

# Alertmanager configuration (optional)
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

# Load rules once and periodically evaluate them
rule_files:
  - "alerts/audit-system-alerts.yml"
  - "alerts/database-alerts.yml"
  - "alerts/audit-failures-alerts.yml"
  - "alerts/security-alerts.yml"

# Scrape configurations
scrape_configs:
  # ThinkOnErp API metrics
  - job_name: 'thinkonerp-api'
    static_configs:
      - targets: ['host.docker.internal:5000']  # Use host.docker.internal for Docker on Mac/Windows
        labels:
          service: 'api'
          component: 'thinkonerp'
    metrics_path: '/metrics'
    scrape_interval: 10s
    scrape_timeout: 5s

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus'

  # Grafana monitoring (optional)
  - job_name: 'grafana'
    static_configs:
      - targets: ['grafana:3000']
        labels:
          service: 'grafana'
    metrics_path: '/metrics'

  # AlertManager monitoring (optional)
  - job_name: 'alertmanager'
    static_configs:
      - targets: ['alertmanager:9093']
        labels:
          service: 'alertmanager'
    metrics_path: '/metrics'
