global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'thinkonerp-production'
    environment: 'production'

# Alertmanager configuration (optional)
# Uncomment to enable AlertManager integration for advanced alert routing
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets:
#           - alertmanager:9093

# Load alert rules for audit system monitoring
rule_files:
  - "alerts/audit-system-alerts.yml"
  - "alerts/database-alerts.yml"
  - "alerts/audit-failures-alerts.yml"
  - "alerts/security-alerts.yml"

scrape_configs:
  # ThinkOnErp API metrics
  - job_name: 'thinkonerp-api'
    static_configs:
      - targets: ['thinkonerp-api:5000']
    metrics_path: '/metrics'
    scrape_interval: 15s
    scrape_timeout: 10s
    
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
