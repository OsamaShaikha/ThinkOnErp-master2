apiVersion: 1

providers:
  - name: 'ThinkOnErp Traceability System'
    orgId: 1
    folder: 'Traceability System'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards
      foldersFromFilesStructure: false
