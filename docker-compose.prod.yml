version: '3.8'

# Production deployment without Oracle (assumes external Oracle database)
services:
  thinkonerp-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: thinkonerp-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      # Override these with your production Oracle connection
      - ConnectionStrings__OracleDb=${ORACLE_CONNECTION_STRING}
      - JwtSettings__SecretKey=${JWT_SECRET_KEY}
      - JwtSettings__Issuer=${JWT_ISSUER:-ThinkOnErpAPI}
      - JwtSettings__Audience=${JWT_AUDIENCE:-ThinkOnErpClient}
      - JwtSettings__ExpiryInMinutes=${JWT_EXPIRY_MINUTES:-60}
      - Serilog__MinimumLevel__Default=${LOG_LEVEL:-Information}
    ports:
      - "5000:8080"
    networks:
      - thinkonerp-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: nginx:alpine
    container_name: thinkonerp-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - thinkonerp-api
    networks:
      - thinkonerp-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  thinkonerp-network:
    driver: bridge
